<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrum Master Quiz 🚀</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    color: #fff;
  }

  /* HOME SCREEN */
  #home {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 20px;
  }
  .logo { font-size: 64px; margin-bottom: 16px; }
  .title { font-size: 42px; font-weight: 900; background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .subtitle { font-size: 18px; color: #a0aec0; margin-bottom: 48px; }
  .stats-grid { display: flex; gap: 24px; margin-bottom: 48px; flex-wrap: wrap; justify-content: center; }
  .stat-card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 20px 32px; text-align: center; }
  .stat-num { font-size: 36px; font-weight: 900; color: #ffd200; }
  .stat-label { font-size: 13px; color: #a0aec0; margin-top: 4px; }
  .start-btn {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e; font-size: 22px; font-weight: 900;
    border: none; padding: 20px 64px; border-radius: 50px; cursor: pointer;
    box-shadow: 0 8px 32px rgba(247,151,30,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(247,151,30,0.5); }
  .best-score { margin-top: 24px; font-size: 14px; color: #68d391; }

  /* QUIZ SCREEN */
  #quiz { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; margin-bottom: 16px;
  }
  .progress-wrap { flex: 1; background: rgba(255,255,255,0.15); border-radius: 8px; height: 10px; margin: 0 16px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #f7971e, #ffd200); border-radius: 8px; transition: width 0.4s; }
  .q-counter { font-size: 14px; color: #a0aec0; min-width: 70px; }
  .score-pill { background: rgba(255,255,255,0.12); border-radius: 20px; padding: 6px 16px; font-weight: 700; font-size: 15px; color: #ffd200; }

  .timer-wrap { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; }
  .timer-svg { transform: rotate(-90deg); }
  .timer-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
  .timer-arc { fill: none; stroke: #ffd200; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-num { position: absolute; font-size: 28px; font-weight: 900; color: #fff; }

  .q-tag {
    display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
    margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;
  }
  .q-tag.single { background: rgba(104,211,145,0.2); color: #68d391; border: 1px solid #68d391; }
  .q-tag.multi { background: rgba(99,179,237,0.2); color: #63b3ed; border: 1px solid #63b3ed; }

  .question-card {
    background: rgba(255,255,255,0.07); border-radius: 20px;
    padding: 24px 28px; margin-bottom: 24px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 20px; font-weight: 600; line-height: 1.5;
  }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

  .option-btn {
    border: none; border-radius: 16px; padding: 18px 20px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    text-align: left; line-height: 1.4; transition: transform 0.15s, box-shadow 0.15s;
    position: relative; overflow: hidden;
  }
  .option-btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .option-btn:disabled { cursor: default; }

  .opt-A { background: linear-gradient(135deg, #e53e3e, #c53030); color: #fff; }
  .opt-B { background: linear-gradient(135deg, #3182ce, #2b6cb0); color: #fff; }
  .opt-C { background: linear-gradient(135deg, #d69e2e, #b7791f); color: #fff; }
  .opt-D { background: linear-gradient(135deg, #38a169, #276749); color: #fff; }

  .option-btn.selected { outline: 4px solid #fff; transform: scale(1.02); }
  .option-btn.correct { background: linear-gradient(135deg, #68d391, #38a169) !important; outline: 4px solid #fff; }
  .option-btn.wrong { background: linear-gradient(135deg, #fc8181, #e53e3e) !important; opacity: 0.7; }
  .option-btn.reveal-correct { outline: 4px solid #68d391; }

  .opt-label {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.25);
    font-size: 13px; font-weight: 900; margin-right: 12px; flex-shrink: 0;
  }
  .opt-inner { display: flex; align-items: center; }

  .submit-btn {
    display: block; width: 100%; padding: 16px;
    background: linear-gradient(135deg, #805ad5, #6b46c1);
    color: #fff; font-size: 18px; font-weight: 800;
    border: none; border-radius: 14px; cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    margin-bottom: 16px;
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-2px); }
  .submit-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .explanation {
    display: none; background: rgba(104,211,145,0.12);
    border: 1px solid rgba(104,211,145,0.3); border-radius: 14px;
    padding: 16px 20px; font-size: 15px; line-height: 1.6; color: #e2e8f0;
    margin-bottom: 16px;
  }
  .explanation .exp-title { color: #68d391; font-weight: 800; margin-bottom: 6px; font-size: 13px; text-transform: uppercase; }
  .wrong-exp { background: rgba(252,129,129,0.1); border-color: rgba(252,129,129,0.3); }
  .wrong-exp .exp-title { color: #fc8181; }

  .next-btn {
    display: none; width: 100%; padding: 16px;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e; font-size: 18px; font-weight: 900;
    border: none; border-radius: 14px; cursor: pointer;
    transition: transform 0.2s;
  }
  .next-btn:hover { transform: translateY(-2px); }

  /* RESULTS SCREEN */
  #results { display: none; padding: 20px; max-width: 700px; margin: 0 auto; min-height: 100vh; }
  .results-inner { padding-top: 40px; text-align: center; }
  .results-emoji { font-size: 80px; margin-bottom: 16px; }
  .results-title { font-size: 36px; font-weight: 900; margin-bottom: 8px; }
  .results-score { font-size: 72px; font-weight: 900; color: #ffd200; margin-bottom: 4px; }
  .results-of { font-size: 18px; color: #a0aec0; margin-bottom: 32px; }
  .breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 40px; }
  .bd-card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; }
  .bd-num { font-size: 32px; font-weight: 900; }
  .bd-label { font-size: 12px; color: #a0aec0; margin-top: 4px; }
  .correct-color { color: #68d391; }
  .wrong-color { color: #fc8181; }
  .skip-color { color: #f6ad55; }
  .results-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
  .play-again-btn {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e; font-size: 18px; font-weight: 900;
    border: none; padding: 16px 48px; border-radius: 50px; cursor: pointer;
    transition: transform 0.2s;
  }
  .play-again-btn:hover { transform: translateY(-2px); }
  .review-btn {
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 18px; font-weight: 700;
    padding: 16px 48px; border-radius: 50px; cursor: pointer;
    transition: background 0.2s;
  }
  .review-btn:hover { background: rgba(255,255,255,0.2); }

  .review-list { text-align: left; }
  .review-item { background: rgba(255,255,255,0.06); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; border-left: 4px solid #68d391; }
  .review-item.wrong { border-left-color: #fc8181; }
  .review-item.skipped { border-left-color: #f6ad55; }
  .review-q { font-size: 14px; color: #a0aec0; margin-bottom: 8px; font-weight: 600; }
  .review-your { font-size: 14px; margin-bottom: 4px; }
  .review-correct-ans { font-size: 14px; color: #68d391; font-weight: 700; }

  /* CONFETTI */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none; z-index: 9999;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* STREAK */
  .streak-popup {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e;
    font-size: 18px; font-weight: 900; padding: 12px 28px; border-radius: 50px;
    z-index: 100; animation: popIn 0.4s ease, popOut 0.4s ease 1.5s forwards;
    pointer-events: none;
  }
  @keyframes popIn { 0% { transform: translateX(-50%) scale(0.5); opacity: 0; } 100% { transform: translateX(-50%) scale(1); opacity: 1; } }
  @keyframes popOut { 0% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home">
  <div class="logo">🏉</div>
  <div class="title">Scrum Master Quiz</div>
  <div class="subtitle">Sharpen your skills · 30 random questions each time</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num">50+</div>
      <div class="stat-label">Question Bank</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">30</div>
      <div class="stat-label">Per Session</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">30s</div>
      <div class="stat-label">Per Question</div>
    </div>
  </div>
  <button class="start-btn" onclick="startQuiz()">Start Quiz 🚀</button>
  <div class="best-score" id="bestScoreDisplay"></div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz">
  <div class="top-bar">
    <div class="q-counter" id="qCounter">Q 1 / 30</div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="score-pill">⭐ <span id="liveScore">0</span></div>
  </div>
  <div class="timer-wrap">
    <svg class="timer-svg" width="80" height="80" viewBox="0 0 80 80">
      <circle class="timer-bg" cx="40" cy="40" r="34"/>
      <circle class="timer-arc" id="timerArc" cx="40" cy="40" r="34" stroke-dasharray="213.6" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-num" id="timerNum">30</div>
  </div>
  <div id="qTypeTag" class="q-tag single">Single Answer</div>
  <div class="question-card" id="questionText"></div>
  <div class="options-grid" id="optionsGrid"></div>
  <button class="submit-btn" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>
  <div class="explanation" id="explanationBox">
    <div class="exp-title" id="expTitle">✅ Correct!</div>
    <div id="expText"></div>
  </div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
</div>

<!-- RESULTS SCREEN -->
<div id="results">
  <div class="results-inner">
    <div class="results-emoji" id="resultsEmoji">🎉</div>
    <div class="results-title" id="resultsTitle">Quiz Complete!</div>
    <div class="results-score" id="resultsScore">0</div>
    <div class="results-of" id="resultsOf">out of 30 correct</div>
    <div class="breakdown">
      <div class="bd-card"><div class="bd-num correct-color" id="bdCorrect">0</div><div class="bd-label">Correct</div></div>
      <div class="bd-card"><div class="bd-num wrong-color" id="bdWrong">0</div><div class="bd-label">Wrong</div></div>
      <div class="bd-card"><div class="bd-num skip-color" id="bdSkipped">0</div><div class="bd-label">Timed Out</div></div>
    </div>
    <div class="results-actions">
      <button class="play-again-btn" onclick="startQuiz()">Play Again 🔄</button>
      <button class="review-btn" onclick="showReview()">Review Answers 📋</button>
    </div>
    <div class="review-list" id="reviewList" style="display:none"></div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  {
    q: "When two senior developers had a major disagreement on implementing a feature, what did the Scrum Master organize?",
    type: "single",
    opts: [
      "Escalated the issue to management immediately",
      "A dedicated session where both presented viewpoints, pros/cons, guided by open-ended questions",
      "Let the team vote on which approach to use",
      "Assigned an external architect to make the final decision"
    ],
    correct: [1],
    explain: "The SM organized a dedicated session where both developers could present their viewpoints and pros/cons. Open-ended questions like 'How will this impact technical debt?' guided the discussion, leading to a hybrid approach."
  },
  {
    q: "What technique was used in a retrospective to discover why stories were consistently left incomplete?",
    type: "single",
    opts: ["Mad, Sad, Glad", "Start, Stop, Continue", "5 Whys technique", "Health Check exercise"],
    correct: [2],
    explain: "The SM applied the 5 Whys technique — asking 'Why were stories left incomplete?' repeatedly to drill down to the root cause: backlog refinement was rushed, leaving stories unclear."
  },
  {
    q: "When management pushed for 35 story points but the team's average velocity was 25, what did the SM show to make the case against overcommitment?",
    type: "single",
    opts: [
      "Team skill matrix and capability assessment",
      "Velocity data from past sprints",
      "Stakeholder requirements document",
      "The current sprint's burndown chart"
    ],
    correct: [1],
    explain: "The SM facilitated a discussion with the Product Owner and stakeholders, showing velocity data from past sprints to demonstrate that 35 points was not realistic for the team."
  },
  {
    q: "Why is the Fibonacci sequence preferred for Agile story point estimation?",
    type: "single",
    opts: [
      "It is the most widely accepted mathematical sequence in software",
      "It reflects how uncertainty grows with task size",
      "It makes calculation easier for developers",
      "It was specifically invented for Agile environments"
    ],
    correct: [1],
    explain: "The Fibonacci sequence reflects how uncertainty grows with task size. Estimating 2 vs 3 is easy, but the gap between 8, 13, and 21 represents rapidly increasing uncertainty — matching real-world complexity."
  },
  {
    q: "What simple practice did the team suggest to improve Jira transparency without adding significant overhead?",
    type: "single",
    opts: [
      "Weekly reporting meetings with stakeholders",
      "Automated Jira ticket updates via CI/CD pipeline",
      "An end-of-day check-in where everyone updated Jira and summarized progress",
      "Daily status emails to the Product Owner"
    ],
    correct: [2],
    explain: "The team suggested an end-of-day check-in where everyone updated Jira and quickly summarized progress. Within a couple of sprints, stakeholders had real-time visibility and collaboration improved."
  },
  {
    q: "When a retrospective drifted into unrelated deep technical discussions, how did the SM redirect the team without being directive?",
    type: "single",
    opts: [
      "Ended the retrospective and scheduled a separate technical meeting",
      "Asked the team to take a vote on whether to continue the discussion",
      "Asked 'How does this connect to what we're trying to improve this sprint?'",
      "Assigned a dedicated timekeeper to enforce the agenda"
    ],
    correct: [2],
    explain: "A gentle open-ended question — 'How does this connect to what we're trying to improve this sprint?' — was enough for the team to self-correct without the SM being directive."
  },
  {
    q: "What was the measurable result of setting up a faster test environment and automated regression tests?",
    type: "single",
    opts: [
      "The team was able to skip manual testing entirely",
      "The feedback cycle went from hours to minutes, and bugs were caught earlier",
      "Sprint length was reduced from 2 weeks to 1 week",
      "The DevOps team took over all testing responsibilities"
    ],
    correct: [1],
    explain: "The feedback cycle went from hours to minutes. Developers could test changes immediately, bugs were caught earlier, and the team's sprint completion rate improved significantly."
  },
  {
    q: "According to the documents, what is the PRIMARY value of the Fibonacci sequence — beyond just the number estimates?",
    type: "single",
    opts: [
      "It provides mathematically precise effort values",
      "It encourages meaningful discussions that surface hidden assumptions and improve shared understanding",
      "It helps managers predict delivery dates accurately",
      "It prevents senior developers from overestimating complexity"
    ],
    correct: [1],
    explain: "The value is not the number itself, but the discussions it triggers. A big spread (e.g., 5 vs 13) surfaces hidden assumptions and dependencies, improving shared understanding across the team."
  },
  {
    q: "When the Product Owner constantly changed priorities mid-sprint, what structured rule was created for handling new ideas?",
    type: "single",
    opts: [
      "New ideas require a team vote before being accepted into the sprint",
      "New ideas go on the backlog and are discussed during backlog refinement",
      "New ideas are automatically scheduled for the next sprint",
      "New ideas must be rejected until after the Sprint Review"
    ],
    correct: [1],
    explain: "The SM created a rule: new ideas go to the backlog and are discussed during backlog refinement. This gave the PO a clear channel for ideas while giving the team sprint stability. The key was 'not now, but we'll get to it.'"
  },
  {
    q: "What practice was introduced to prevent a senior developer from dominating estimation and silencing junior team members?",
    type: "single",
    opts: [
      "Removing the senior developer from refinement sessions",
      "Having junior developers estimate first, before seniors share their view",
      "Silent estimation with Planning Poker — everyone reveals cards simultaneously",
      "Separate estimation sessions for junior and senior developers"
    ],
    correct: [2],
    explain: "Silent estimation using Planning Poker cards was introduced — everyone puts their card down at the same time. This ensures all voices are heard before anyone is influenced by the senior developer's opinion."
  },
  {
    q: "During a Sprint Review when a key client demanded a new out-of-scope feature, what was the SM's FIRST response?",
    type: "single",
    opts: [
      "Firmly refused the request and explained sprint scope rules",
      "Asked the team if they could squeeze the feature into the sprint",
      "Validated the idea without making a false promise ('That's a fantastic idea, I can see why it's important')",
      "Immediately escalated to the Product Owner to decide on the spot"
    ],
    correct: [2],
    explain: "The SM immediately validated the idea — 'That's a fantastic idea, I can see why it's so important' — without making a false promise. This acknowledged the input while maintaining control of the process."
  },
  {
    q: "For a manager with a waterfall mindset who demanded a hard project completion date, what did the SM provide instead?",
    type: "single",
    opts: [
      "A traditional Gantt chart showing phase-by-phase completion",
      "A detailed project plan broken into monthly milestones",
      "A velocity-based forecast: 'We complete ~25 pts/sprint; ~100 pts remain = ~4 sprints'",
      "A risk register with minimum and maximum delivery date ranges"
    ],
    correct: [2],
    explain: "Instead of a hard date, the SM gave a velocity-based forecast: 'Based on our average velocity of 25 story points per sprint, we forecast completing the core functionality in roughly four to five sprints.' Data-driven, not guessed."
  },
  {
    q: "What percentage of sprint capacity was recommended to allocate to addressing technical debt?",
    type: "single",
    opts: ["5%", "10%", "15%", "20%"],
    correct: [2],
    explain: "The SM advocated to the Product Owner to allocate at least 15% of sprint capacity to addressing technical debt. Debt items were added to the backlog like features, making them a visible, treated priority."
  },
  {
    q: "What change did introducing SMART action items bring to retrospective follow-through?",
    type: "single",
    opts: [
      "Action items became optional and purely ownership-based",
      "Vague items like 'fix the CI/CD pipeline' became specific tasks with named owners and deadlines",
      "Action items were now approved by management before implementation",
      "Teams started tracking action items in a separate project management tool only"
    ],
    correct: [1],
    explain: "'Fix the CI/CD pipeline' became 'Sarah will investigate options for speeding up the CI/CD pipeline and present a recommendation by next Thursday' — a SMART goal that is Specific, Measurable, and Time-bound."
  },
  {
    q: "What was the measurable result of instituting a bi-weekly Dependency Sync meeting between two teams?",
    type: "single",
    opts: [
      "Team velocity increased by 50% in one sprint",
      "Team velocity increased by nearly 30% and became much more predictable",
      "All cross-team dependencies were completely eliminated",
      "The two teams were reorganized and merged into one"
    ],
    correct: [1],
    explain: "Within two sprints, average velocity increased by nearly 30% and became much more predictable. The number of 'blocked' stories on the board dropped to almost zero."
  },
  {
    q: "How is velocity correctly described according to the documents?",
    type: "single",
    opts: [
      "A productivity measure to compare teams fairly",
      "A performance benchmark set by management each sprint",
      "A forecasting tool — not a productivity measure",
      "A capacity ceiling that teams must never exceed"
    ],
    correct: [2],
    explain: "Velocity is a forecasting tool, not a productivity measure. It predicts future work and identifies impediments. A stable velocity is a sign of a healthy, predictable team — not a sign of underperformance."
  },
  {
    q: "When a team member reported being blocked by another team, which of the following were the SM's clarifying questions? (Select all that apply)",
    type: "multi",
    opts: [
      "What exactly do you need from the other team?",
      "Who have you tried to contact, and when?",
      "What was their last response, if any?",
      "Should we cancel the story and move to the next one right away?"
    ],
    correct: [0, 1, 2],
    explain: "The SM asked three questions: 'What exactly do you need?', 'Who have you tried to contact, and when?', and 'What was their last response?' This validates the blocker before acting and ensures the team has explored it."
  },
  {
    q: "What are the TWO explicit reasons for making a blocked story visible on the Scrum board?",
    type: "multi",
    opts: [
      "Transparency — shows everyone, including PO and stakeholders, that there's a problem",
      "Accountability — forces the question: should the team swarm on something else while waiting?",
      "Compliance — the Scrum Guide requires blocked items to be flagged",
      "Velocity tracking — blocked stories are excluded from velocity calculations"
    ],
    correct: [0, 1],
    explain: "Two explicit reasons: Transparency (shows everyone there is a problem) and Accountability (forces the question: 'Is this the most valuable thing to work on right now, or should we swarm elsewhere?')."
  },
  {
    q: "Which techniques are mentioned across the documents for improving retrospective engagement? (Select all that apply)",
    type: "multi",
    opts: [
      "Mad, Sad, Glad",
      "Health Check — rating team aspects on a 1–5 scale",
      "Anonymous sticky note submissions",
      "SWOT Analysis"
    ],
    correct: [0, 1, 2],
    explain: "Mad Sad Glad, Health Check (rating aspects 1-5), and anonymous sticky notes are all mentioned. SWOT Analysis is not mentioned in the documents."
  },
  {
    q: "What four-step approach did the SM take to uncover hidden impediments not being shared in stand-ups?",
    type: "multi",
    opts: [
      "Observed non-verbal cues — quiet demeanor, stressed expressions, tasks taking longer than estimated",
      "Conducted private one-on-one check-ins with open-ended, non-accusatory questions",
      "Changed retrospective format to anonymous exercises like Mad Sad Glad",
      "Modeled the behavior by openly sharing their own blockers during stand-up"
    ],
    correct: [0, 1, 2, 3],
    explain: "All four steps were explicitly described: observing non-verbal cues, private one-on-ones, changing retrospective format to anonymous exercises, and modeling the behavior by sharing own blockers in stand-ups."

// ─── STATE ────────────────────────────────────────────────
let sessionQs = [], current = 0, score = 0;
let correctCount = 0, wrongCount = 0, skippedCount = 0;
let timer = null, timeLeft = 30;
let answered = false;
let selectedOpts = [];
let sessionLog = [];
let streak = 0;

const TIMER_MAX = 30;
const CIRCUMFERENCE = 213.6;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const shuffled = shuffle(ALL_QUESTIONS);
  sessionQs = shuffled.slice(0, 30);
  current = 0; score = 0; correctCount = 0; wrongCount = 0; skippedCount = 0;
  selectedOpts = []; answered = false; streak = 0; sessionLog = [];

  document.getElementById('home').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('liveScore').textContent = '0';
  loadQuestion();
}

function loadQuestion() {
  clearInterval(timer);
  const q = sessionQs[current];
  answered = false;
  selectedOpts = [];

  // Update top bar
  document.getElementById('qCounter').textContent = `Q ${current + 1} / 30`;
  const pct = (current / 30) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  // Tag
  const tag = document.getElementById('qTypeTag');
  if (q.type === 'multi') {
    tag.textContent = '✦ Multiple Correct Answers';
    tag.className = 'q-tag multi';
  } else {
    tag.textContent = '● Single Answer';
    tag.className = 'q-tag single';
  }

  // Question
  document.getElementById('questionText').textContent = q.q;

  // Options — shuffle options but track original indices
  const indices = shuffle([0, 1, 2, 3]);
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const colors = ['opt-A', 'opt-B', 'opt-C', 'opt-D'];
  const labels = ['A', 'B', 'C', 'D'];
  
  indices.forEach((origIdx, i) => {
    const btn = document.createElement('button');
    btn.className = `option-btn ${colors[i]}`;
    btn.dataset.origIdx = origIdx;
    btn.innerHTML = `<span class="opt-inner"><span class="opt-label">${labels[i]}</span>${q.opts[origIdx]}</span>`;
    btn.onclick = () => toggleOption(btn, origIdx, q.type);
    grid.appendChild(btn);
  });

  // Reset UI
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').style.display = 'block';
  document.getElementById('explanationBox').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  // Timer
  timeLeft = TIMER_MAX;
  updateTimerUI(TIMER_MAX);
  timer = setInterval(() => {
    timeLeft--;
    updateTimerUI(timeLeft);
    if (timeLeft <= 0) {
      clearInterval(timer);
      autoSkip();
    }
  }, 1000);
}

function updateTimerUI(t) {
  document.getElementById('timerNum').textContent = t;
  const arc = document.getElementById('timerArc');
  const offset = CIRCUMFERENCE * (1 - t / TIMER_MAX);
  arc.style.strokeDashoffset = offset;
  if (t <= 10) arc.style.stroke = '#fc8181';
  else if (t <= 20) arc.style.stroke = '#f6ad55';
  else arc.style.stroke = '#ffd200';
}

function toggleOption(btn, origIdx, type) {
  if (answered) return;
  if (type === 'single') {
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    selectedOpts = [origIdx];
    btn.classList.add('selected');
  } else {
    const pos = selectedOpts.indexOf(origIdx);
    if (pos === -1) {
      selectedOpts.push(origIdx);
      btn.classList.add('selected');
    } else {
      selectedOpts.splice(pos, 1);
      btn.classList.remove('selected');
    }
  }
  document.getElementById('submitBtn').disabled = selectedOpts.length === 0;
}

function submitAnswer() {
  if (answered || selectedOpts.length === 0) return;
  clearInterval(timer);
  answered = true;
  const q = sessionQs[current];
  const isCorrect = arraysEqual(selectedOpts.sort(), q.correct.sort());
  
  revealAnswers(q, isCorrect, false);
  updateScore(isCorrect, false);
  
  sessionLog.push({ q: q.q, correct: isCorrect, skipped: false,
    yourAns: selectedOpts.map(i => q.opts[i]),
    correctAns: q.correct.map(i => q.opts[i]) });
}

function autoSkip() {
  answered = true;
  const q = sessionQs[current];
  skippedCount++;
  streak = 0;
  
  document.querySelectorAll('.option-btn').forEach(btn => {
    const orig = parseInt(btn.dataset.origIdx);
    btn.disabled = true;
    if (q.correct.includes(orig)) btn.classList.add('reveal-correct');
  });
  document.getElementById('submitBtn').style.display = 'none';
  
  const expBox = document.getElementById('explanationBox');
  expBox.className = 'explanation wrong-exp';
  expBox.style.display = 'block';
  document.getElementById('expTitle').textContent = '⏰ Time\'s up!';
  document.getElementById('expText').textContent = q.explain;
  document.getElementById('nextBtn').style.display = 'block';
  
  sessionLog.push({ q: q.q, correct: false, skipped: true,
    yourAns: [], correctAns: q.correct.map(i => q.opts[i]) });
}

function revealAnswers(q, isCorrect, skipped) {
  document.querySelectorAll('.option-btn').forEach(btn => {
    const orig = parseInt(btn.dataset.origIdx);
    btn.disabled = true;
    if (q.correct.includes(orig)) {
      btn.classList.remove('selected');
      btn.classList.add('correct');
    } else if (selectedOpts.includes(orig)) {
      btn.classList.remove('selected');
      btn.classList.add('wrong');
    }
  });
  document.getElementById('submitBtn').style.display = 'none';
  
  const expBox = document.getElementById('explanationBox');
  if (isCorrect) {
    expBox.className = 'explanation';
    document.getElementById('expTitle').textContent = '✅ Correct!';
  } else {
    expBox.className = 'explanation wrong-exp';
    document.getElementById('expTitle').textContent = '❌ Not quite!';
  }
  document.getElementById('expText').textContent = q.explain;
  expBox.style.display = 'block';
  document.getElementById('nextBtn').style.display = 'block';
}

function updateScore(isCorrect, skipped) {
  if (isCorrect) {
    correctCount++;
    streak++;
    const pts = 10 + (streak > 1 ? (streak - 1) * 2 : 0);
    score += pts;
    document.getElementById('liveScore').textContent = score;
    if (streak >= 3) showStreak(streak);
  } else {
    wrongCount++;
    streak = 0;
  }
}

function showStreak(n) {
  const existing = document.querySelector('.streak-popup');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'streak-popup';
  el.textContent = `🔥 ${n}x Streak! +${(n - 1) * 2} bonus`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

function nextQuestion() {
  current++;
  if (current >= 30) {
    endQuiz();
  } else {
    loadQuestion();
  }
}

function endQuiz() {
  clearInterval(timer);
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  
  const pct = Math.round((correctCount / 30) * 100);
  let emoji = '😓', title = 'Keep Practicing!';
  if (pct >= 90) { emoji = '🏆'; title = 'Outstanding!'; }
  else if (pct >= 75) { emoji = '🎉'; title = 'Great Job!'; }
  else if (pct >= 60) { emoji = '👍'; title = 'Good Effort!'; }
  else if (pct >= 40) { emoji = '📚'; title = 'Keep Studying!'; }
  
  document.getElementById('resultsEmoji').textContent = emoji;
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsScore').textContent = correctCount;
  document.getElementById('resultsOf').textContent = `out of 30 correct  ·  ${pct}%  ·  Score: ${score}`;
  document.getElementById('bdCorrect').textContent = correctCount;
  document.getElementById('bdWrong').textContent = wrongCount;
  document.getElementById('bdSkipped').textContent = skippedCount;
  
  // Best score
  const best = parseInt(localStorage.getItem('scrumQuizBest') || '0');
  if (score > best) localStorage.setItem('scrumQuizBest', score);
  
  document.getElementById('reviewList').style.display = 'none';
  if (pct >= 75) launchConfetti();
}

function showReview() {
  const list = document.getElementById('reviewList');
  if (list.style.display === 'block') { list.style.display = 'none'; return; }
  list.innerHTML = '';
  sessionLog.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'review-item' + (item.skipped ? ' skipped' : item.correct ? '' : ' wrong');
    const icon = item.skipped ? '⏰' : item.correct ? '✅' : '❌';
    div.innerHTML = `
      <div class="review-q">${icon} Q${i + 1}: ${item.q}</div>
      ${!item.correct && !item.skipped ? `<div class="review-your" style="color:#fc8181">Your answer: ${item.yourAns.join(' + ')}</div>` : ''}
      <div class="review-correct-ans">✓ Correct: ${item.correctAns.join(' + ')}</div>
    `;
    list.appendChild(div);
  });
  list.style.display = 'block';
}

function launchConfetti() {
  const colors = ['#ffd200','#f7971e','#68d391','#63b3ed','#fc8181','#b794f4'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (Math.random() * 12 + 6) + 'px';
      el.style.height = (Math.random() * 12 + 6) + 'px';
      el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 40);
  }
}

function arraysEqual(a, b) {
  return a.length === b.length && a.every((v, i) => v === b[i]);
}

// Show best score on home
window.onload = () => {
  const best = localStorage.getItem('scrumQuizBest');
  if (best) document.getElementById('bestScoreDisplay').textContent = `🏅 Your best score: ${best} points`;
};
</script>
